version: 2
updates:
  - package-ecosystem: cargo
    directory: "/src-tauri"
    schedule:
      interval: weekly
    ignore:
      # glib is a transitive dependency via webkit2gtk (Linux only).
      # HermesTray is built on Windows (WebView2), glib is irrelevant.
      # The 0.18.x unsoundness does not affect us.
      - dependency-name: "glib"
